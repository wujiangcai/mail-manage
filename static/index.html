<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>邮箱取码</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, Arial, "Microsoft YaHei", sans-serif;
      background: #f4f6fa;
      color: #111827;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #f4f6fa; }
    main { max-width: 1180px; margin: 0 auto; padding: 28px 18px 48px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 18px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo { width: 40px; height: 40px; border-radius: 8px; display: grid; place-items: center; background: #1f2937; color: #fff; font-weight: 800; }
    h1 { margin: 0; font-size: 23px; letter-spacing: 0; }
    h2 { margin: 0 0 12px; font-size: 17px; }
    .muted { color: #64748b; font-size: 13px; }
    a { color: #2563eb; text-decoration: none; }
    .shell { display: grid; grid-template-columns: 360px minmax(0, 1fr); gap: 16px; align-items: start; }
    .panel { background: #fff; border: 1px solid #dbe3ee; border-radius: 8px; box-shadow: 0 12px 26px rgba(15, 23, 42, .06); padding: 18px; }
    label { display: grid; gap: 7px; font-size: 13px; color: #334155; margin-top: 12px; }
    input, button, select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 7px;
      padding: 10px 11px;
      font: inherit;
      background: #fff;
      color: #0f172a;
    }
    input:focus, select:focus { outline: 2px solid rgba(37, 99, 235, .16); border-color: #2563eb; }
    button { background: #2563eb; color: #fff; border-color: #2563eb; font-weight: 700; cursor: pointer; }
    button.secondary { background: #fff; color: #2563eb; }
    button:disabled { opacity: .62; cursor: wait; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .account-card { display: grid; gap: 7px; margin-top: 14px; padding: 12px; border: 1px solid #dbe3ee; border-radius: 8px; background: #f8fafc; }
    .email, .mono { font-family: Consolas, "Courier New", monospace; word-break: break-all; }
    .email { font-weight: 700; }
    .code-box { min-height: 178px; display: grid; place-items: center; text-align: center; border: 1px dashed #bdc8d8; border-radius: 8px; background: #f8fafc; }
    .code { font-size: clamp(40px, 7vw, 70px); line-height: 1; font-weight: 900; color: #0f766e; letter-spacing: 4px; }
    .summary { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin: 14px 0; }
    .summary div { border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; background: #f8fafc; }
    .summary b { display: block; font-size: 18px; margin-top: 2px; }
    .message-detail { width: 100%; margin-top: 14px; border-collapse: collapse; font-size: 13px; }
    .message-detail th, .message-detail td { padding: 9px 8px; border-bottom: 1px solid #e2e8f0; text-align: left; vertical-align: top; }
    .message-detail th { color: #64748b; font-weight: 700; width: 86px; }
    .mail-list { display: grid; gap: 10px; margin-top: 12px; }
    .mail-item { width: 100%; text-align: left; border: 1px solid #dbe3ee; border-radius: 8px; padding: 12px; background: #fff; color: #111827; cursor: pointer; }
    .mail-item:hover { border-color: #93c5fd; background: #f8fbff; }
    .mail-head { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
    .subject { font-weight: 800; overflow-wrap: anywhere; }
    .time { color: #64748b; font-size: 12px; white-space: nowrap; }
    .preview { color: #475569; margin-top: 7px; line-height: 1.45; overflow-wrap: anywhere; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { display: inline-flex; align-items: center; min-height: 22px; border-radius: 999px; padding: 2px 8px; background: #eef2ff; color: #3730a3; font-size: 12px; }
    .tag.code-tag { background: #ecfdf3; color: #047857; }
    .empty { display: grid; place-items: center; min-height: 160px; border: 1px dashed #cbd5e1; border-radius: 8px; color: #64748b; background: #f8fafc; }
    .toast { min-height: 22px; margin-top: 10px; color: #b42318; font-size: 13px; white-space: pre-wrap; }
    .hidden { display: none !important; }
    @media (max-width: 860px) {
      .shell { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .summary { grid-template-columns: 1fr; }
      .mail-head { display: grid; }
      .time { white-space: normal; }
    }
  </style>
</head>
<body>
<main>
  <div class="topbar">
    <div class="brand">
      <div class="logo">MC</div>
      <div>
        <h1>邮箱取码</h1>
        <div class="muted">Access Code 绑定邮箱后可读取最近邮件和验证码。</div>
      </div>
    </div>
    <a class="muted" href="/admin">管理员后台</a>
  </div>

  <div class="shell">
    <section class="panel">
      <h2>取件凭证</h2>
      <label>Access Code
        <input id="accessCode" autocomplete="off" placeholder="mc_xxxxxxxxxxxxxxxxx" />
      </label>
      <button id="loginBtn" type="button" style="margin-top:14px;">登录取件</button>
      <div id="loginError" class="toast"></div>

      <div id="accountCard" class="account-card hidden">
        <div class="muted">当前邮箱</div>
        <div id="accountEmail" class="email"></div>
        <div id="grantInfo" class="muted"></div>
      </div>

      <div class="actions">
        <button id="fetchCodeBtn" type="button" disabled>获取验证码</button>
        <button id="fetchMessagesBtn" type="button" class="secondary" disabled>查看邮件</button>
      </div>
      <button id="logoutBtn" type="button" class="secondary hidden" style="margin-top:10px;">退出登录</button>
    </section>

    <section class="panel">
      <h2>最新验证码</h2>
      <div class="code-box">
        <div>
          <div id="code" class="code">等待获取</div>
          <div id="statusText" class="muted">等待登录</div>
        </div>
      </div>
      <table id="messageTable" class="message-detail hidden">
        <tbody>
          <tr><th>发件人</th><td id="msgSender"></td></tr>
          <tr><th>收件人</th><td id="msgRecipients"></td></tr>
          <tr><th>标题</th><td id="msgSubject"></td></tr>
          <tr><th>时间</th><td id="msgTime"></td></tr>
          <tr><th>预览</th><td id="msgPreview"></td></tr>
        </tbody>
      </table>

      <div class="summary">
        <div><span class="muted">邮件数量</span><b id="mailCount">0</b></div>
        <div><span class="muted">匹配验证码</span><b id="codeCount">0</b></div>
        <div><span class="muted">文件夹</span><b id="boxCount">0</b></div>
      </div>
      <div id="mailList" class="mail-list">
        <div class="empty">暂无邮件</div>
      </div>
    </section>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let token = localStorage.getItem('mailCodeUserToken') || '';
let clientConfig = {
  userCodePoll: { intervalSeconds: 5, timeoutSeconds: 90 },
};
let codePolling = false;

function setBusy(busy) {
  $('loginBtn').disabled = busy;
  $('fetchCodeBtn').disabled = busy || !token;
  $('fetchMessagesBtn').disabled = busy || !token;
}

function showMessage(message) {
  $('loginError').textContent = message || '';
}

function setStatus(message) {
  $('statusText').textContent = message || '';
}

function cleanPreview(value) {
  return String(value || '')
    .replace(/<style\b[^>]*>[\s\S]*?<\/style>/gi, ' ')
    .replace(/<script\b[^>]*>[\s\S]*?<\/script>/gi, ' ')
    .replace(/<!--[\s\S]*?-->/g, ' ')
    .replace(/<[^>]+>/g, ' ')
    .replace(/@font-face\s*\{[\s\S]*?\}/gi, ' ')
    .replace(/(?:\.[\w-]+|#[\w-]+|[a-z][\w-]*)\s*\{[^{}]{0,1200}\}/gi, ' ')
    .replace(/(?:font-family|font-style|font-weight|font-display|line-height|padding|width|color|background|margin|border)\s*:\s*[^;{}]{0,240};?/gi, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[char]));
}

function fmtTime(value) {
  if (!value) return '-';
  const date = typeof value === 'number' ? new Date(value) : new Date(value);
  if (Number.isNaN(date.getTime())) return String(value);
  return date.toLocaleString('zh-CN', { hour12: false });
}

function getSender(message) {
  return message?.from?.emailAddress?.address || '';
}

function getRecipients(message) {
  const recipients = message?.recipients?.all;
  return Array.isArray(recipients) ? recipients.join(', ') : '';
}

function findCode(message) {
  const body = message?.body && typeof message.body === 'object' ? message.body.content : '';
  const text = [message?.subject, cleanPreview(message?.bodyPreview), cleanPreview(body)].join('\n');
  const match = String(text || '').match(/\b\d{4,8}\b/);
  return match ? match[0] : '';
}

function renderAccount(data) {
  if (!data || !data.account) return;
  $('accountCard').classList.remove('hidden');
  $('accountEmail').textContent = data.account.targetEmail || data.account.email || '(未命名邮箱)';
  const grant = data.grant || {};
  const limit = grant.maxReads ? `${grant.readCount || 0}/${grant.maxReads}` : `${grant.readCount || 0}/不限`;
  const expires = grant.expiresAt ? `，到期 ${fmtTime(grant.expiresAt)}` : '';
  $('grantInfo').textContent = `已取 ${limit}${expires}`;
  $('fetchCodeBtn').disabled = false;
  $('fetchMessagesBtn').disabled = false;
  $('logoutBtn').classList.remove('hidden');
  setStatus('登录成功，可以获取验证码了');
}

async function api(path, body) {
  const response = await fetch(path, {
    method: body ? 'POST' : 'GET',
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  const text = await response.text();
  let data = {};
  try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
  if (!response.ok || data.ok === false) throw new Error(data.error || text || `HTTP ${response.status}`);
  return data;
}

async function loadClientConfig() {
  try {
    const response = await fetch('/api/client-config');
    const data = await response.json();
    if (data.ok) clientConfig = { ...clientConfig, ...data };
  } catch {
    // Defaults are good enough if the config endpoint is unavailable.
  }
}

function delay(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

function renderCode(data) {
  $('code').textContent = data.code || '等待获取';
  setStatus(data.code ? `已获取最新验证码，来源：${data.transport || data.provider || 'mail'}` : '没有匹配到验证码，可稍后重试');
  renderMessageDetail(data.message || {});
}

function renderMessageDetail(message) {
  const preview = cleanPreview(message.bodyPreview || '');
  const hasMessage = Boolean(message.subject || preview || getSender(message));
  $('messageTable').classList.toggle('hidden', !hasMessage);
  $('msgSender').textContent = getSender(message);
  $('msgRecipients').textContent = getRecipients(message);
  $('msgSubject').textContent = message.subject || '';
  $('msgTime').textContent = fmtTime(message.receivedDateTime || message.receivedTimestamp);
  $('msgPreview').textContent = preview;
}

function renderMessages(data) {
  const messages = data.messages || [];
  const mailboxResults = data.mailboxResults || [];
  $('mailCount').textContent = messages.length;
  $('codeCount').textContent = messages.filter(findCode).length;
  $('boxCount').textContent = mailboxResults.length || new Set(messages.map((item) => item.mailbox).filter(Boolean)).size;

  if (!messages.length) {
    $('mailList').innerHTML = '<div class="empty">没有读取到邮件</div>';
    return;
  }

  $('mailList').innerHTML = messages.map((message, index) => {
    const code = findCode(message);
    const recipients = getRecipients(message);
    const preview = cleanPreview(message.bodyPreview || '');
    return `
      <button class="mail-item" type="button" data-message-index="${index}">
        <div class="mail-head">
          <div>
            <div class="subject">${escapeHtml(message.subject || '(无标题)')}</div>
            <div class="muted mono">${escapeHtml(getSender(message) || '-')}</div>
          </div>
          <div class="time">${escapeHtml(fmtTime(message.receivedDateTime || message.receivedTimestamp))}</div>
        </div>
        <div class="preview">${escapeHtml(preview || '无预览内容')}</div>
        <div class="tags">
          ${message.mailbox ? `<span class="tag">${escapeHtml(message.mailbox)}</span>` : ''}
          ${code ? `<span class="tag code-tag">${escapeHtml(code)}</span>` : ''}
          ${recipients ? `<span class="tag">${escapeHtml(recipients)}</span>` : ''}
        </div>
      </button>
    `;
  }).join('');

  document.querySelectorAll('[data-message-index]').forEach((button) => {
    button.addEventListener('click', () => {
      renderMessageDetail(messages[Number(button.dataset.messageIndex)]);
    });
  });
}

$('loginBtn').addEventListener('click', async () => {
  showMessage('正在登录，请稍候...');
  setStatus('正在验证 Access Code...');
  setBusy(true);
  try {
    const data = await api('/api/user/login', { accessCode: $('accessCode').value.trim() });
    token = data.token;
    localStorage.setItem('mailCodeUserToken', token);
    renderAccount(data);
    showMessage('');
  } catch (error) {
    showMessage(error.message);
    setStatus('登录失败，请检查 Access Code');
  } finally {
    setBusy(false);
  }
});

async function waitForCode() {
  const intervalMs = Math.max(2, Number(clientConfig.userCodePoll?.intervalSeconds || 5)) * 1000;
  const timeoutMs = Math.max(intervalMs, Number(clientConfig.userCodePoll?.timeoutSeconds || 90) * 1000);
  const startedAt = Date.now();
  let attempt = 0;

  showMessage('');
  setBusy(true);
  codePolling = true;
  setStatus('正在连接邮箱并查找最新验证码...');
  $('fetchCodeBtn').textContent = '等待中...';
  try {
    while (Date.now() - startedAt <= timeoutMs) {
      attempt += 1;
      setStatus(`正在查找最新验证码，第 ${attempt} 次检查...`);
      const data = await api('/api/user/code', {});
      renderCode(data);
      if (data.code) {
        api('/api/user/me').then(renderAccount).catch(() => {});
        setStatus(`已获取最新验证码，来源：${data.transport || data.provider || 'mail'}`);
        return;
      }
      const remaining = Math.max(0, Math.ceil((timeoutMs - (Date.now() - startedAt)) / 1000));
      setStatus(`暂未找到验证码，${Math.round(intervalMs / 1000)} 秒后自动重试，剩余 ${remaining} 秒`);
      await delay(intervalMs);
    }
    setStatus('等待超时，暂未找到验证码');
  } catch (error) {
    showMessage(error.message);
    setStatus('取码失败，请稍后重试');
  } finally {
    codePolling = false;
    $('fetchCodeBtn').textContent = '获取验证码';
    setBusy(false);
  }
}

$('fetchCodeBtn').addEventListener('click', async () => {
  if (codePolling) return;
  await waitForCode();
});

$('fetchMessagesBtn').addEventListener('click', async () => {
  showMessage('正在读取最近邮件，请稍候...');
  setStatus('正在读取邮箱邮件...');
  setBusy(true);
  try {
    renderMessages(await api('/api/user/messages', {}));
    showMessage('');
    setStatus('邮件读取完成，可点击邮件查看详情');
    api('/api/user/me').then(renderAccount).catch(() => {});
  } catch (error) {
    showMessage(error.message);
    setStatus('读取邮件失败，请稍后重试');
  } finally {
    setBusy(false);
  }
});

$('logoutBtn').addEventListener('click', () => {
  token = '';
  localStorage.removeItem('mailCodeUserToken');
  location.reload();
});

if (token) {
  api('/api/user/me').then(renderAccount).catch(() => {
    token = '';
    localStorage.removeItem('mailCodeUserToken');
  });
}
loadClientConfig();
</script>
</body>
</html>
