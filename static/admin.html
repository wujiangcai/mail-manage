<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>邮箱取码管理后台</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, Arial, "Microsoft YaHei", sans-serif;
      background: #f4f6fa;
      color: #111827;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f4f6fa; }
    main { max-width: 1380px; margin: 0 auto; padding: 26px 18px 52px; }
    .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 18px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo { width: 40px; height: 40px; border-radius: 8px; background: #111827; color: #fff; display: grid; place-items: center; font-weight: 800; }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    h2 { margin: 0 0 12px; font-size: 17px; }
    h3 { margin: 0; font-size: 14px; }
    a { color: #2563eb; text-decoration: none; }
    .muted { color: #64748b; font-size: 13px; }
    .grid { display: grid; grid-template-columns: 390px minmax(0, 1fr); gap: 16px; align-items: start; }
    .panel { background: #fff; border: 1px solid #dbe3ee; border-radius: 8px; padding: 18px; box-shadow: 0 12px 26px rgba(15,23,42,.06); margin-bottom: 16px; }
    label { display: grid; gap: 6px; font-size: 13px; color: #334155; margin-top: 11px; }
    input, textarea, select, button {
      width: 100%; border: 1px solid #cbd5e1; border-radius: 7px; padding: 10px 11px;
      font: inherit; background: #fff; color: #0f172a;
    }
    input:focus, textarea:focus, select:focus { outline: 2px solid rgba(37, 99, 235, .16); border-color: #2563eb; }
    textarea { min-height: 132px; resize: vertical; font-family: Consolas, "Courier New", monospace; }
    button { background: #2563eb; border-color: #2563eb; color: #fff; font-weight: 700; cursor: pointer; }
    button.secondary { background: #fff; color: #2563eb; }
    button.danger { background: #b42318; border-color: #b42318; }
    button.ghost { background: #f8fafc; color: #334155; border-color: #dbe3ee; }
    button:disabled { opacity: .62; cursor: wait; }
    .inline { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .toolbar { display: flex; align-items: end; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .toolbar label { min-width: 180px; margin: 0; }
    .toolbar button { width: auto; min-width: 108px; }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 16px; }
    .stat { background: #fff; border: 1px solid #dbe3ee; border-radius: 8px; padding: 13px; }
    .stat b { display: block; font-size: 24px; margin-top: 2px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #e2e8f0; padding: 10px 8px; text-align: left; vertical-align: top; }
    th { color: #64748b; font-weight: 700; background: #f8fafc; }
    tbody tr:hover { background: #fbfdff; }
    .mono { font-family: Consolas, "Courier New", monospace; word-break: break-all; }
    .pill { display: inline-flex; align-items: center; min-height: 22px; border-radius: 999px; padding: 2px 8px; background: #eef2ff; color: #3730a3; font-size: 12px; }
    .pill.ok { background: #ecfdf3; color: #047857; }
    .pill.off { background: #fee2e2; color: #991b1b; }
    .pill.warn { background: #fff7ed; color: #c2410c; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .actions button { width: auto; padding: 7px 9px; font-size: 12px; }
    .toast { min-height: 22px; color: #b42318; font-size: 13px; margin-top: 10px; white-space: pre-wrap; }
    .secret { background: #ecfdf3; border: 1px solid #abefc6; color: #065f46; border-radius: 8px; padding: 12px; margin-top: 12px; word-break: break-all; }
    .empty { display: grid; place-items: center; min-height: 90px; color: #64748b; border: 1px dashed #cbd5e1; border-radius: 8px; background: #f8fafc; }
    dialog { border: 1px solid #dbe3ee; border-radius: 8px; padding: 0; width: min(560px, calc(100vw - 28px)); box-shadow: 0 24px 70px rgba(15, 23, 42, .22); }
    dialog::backdrop { background: rgba(15, 23, 42, .42); }
    .dialog-body { padding: 18px; }
    .dialog-actions { display: flex; gap: 10px; justify-content: flex-end; padding: 14px 18px; border-top: 1px solid #e2e8f0; background: #f8fafc; }
    .dialog-actions button { width: auto; min-width: 96px; }
    .hidden { display: none !important; }
    @media (max-width: 1040px) {
      .grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .topbar { align-items: flex-start; flex-direction: column; }
    }
    @media (max-width: 700px) {
      .stats, .inline { grid-template-columns: 1fr; }
      .toolbar { display: grid; }
      .toolbar button { width: 100%; }
      table { min-width: 780px; }
      .table-wrap { overflow-x: auto; }
    }
  </style>
</head>
<body>
<main>
  <div class="topbar">
    <div class="brand">
      <div class="logo">AD</div>
      <div>
        <h1>邮箱取码管理后台</h1>
        <div class="muted">邮箱账号、取件凭证、邮件记录统一管理。</div>
      </div>
    </div>
    <a class="muted" href="/">用户取件页</a>
  </div>

  <section id="loginPanel" class="panel">
    <h2>管理员登录</h2>
    <label>后台密码
      <input id="adminPassword" type="password" autocomplete="current-password" placeholder="MAIL_CODE_ADMIN_PASSWORD" />
    </label>
    <button id="adminLoginBtn" type="button" style="margin-top:12px;">登录后台</button>
    <div id="loginError" class="toast"></div>
  </section>

  <section id="dashboard" class="hidden">
    <div class="stats">
      <div class="stat"><span class="muted">邮箱账号</span><b id="statAccounts">0</b></div>
      <div class="stat"><span class="muted">Access Code</span><b id="statGrants">0</b></div>
      <div class="stat"><span class="muted">启用邮箱</span><b id="statEnabled">0</b></div>
      <div class="stat"><span class="muted">邮件记录</span><b id="statMessages">0</b></div>
    </div>

    <div class="grid">
      <div>
        <section class="panel">
          <h2>批量导入邮箱</h2>
          <label>账号类型
            <select id="importProvider">
              <option value="hotmail">Hotmail / Outlook OAuth</option>
              <option value="custom-imap">自定义域名 IMAP</option>
            </select>
          </label>
          <label>默认文件夹
            <input id="importMailboxes" value="INBOX,Junk" />
          </label>
          <label>默认发件人过滤
            <input id="importSenderFilters" placeholder="noreply@example.com, verify@x.com" />
          </label>
          <label>导入内容
            <textarea id="importText" placeholder="Hotmail: email----password----clientId----refreshToken&#10;IMAP: alias@example.com----imap-user@example.com----app-password----imap.example.com----993"></textarea>
          </label>
          <button id="importBtn" type="button" style="margin-top:12px;">导入账号</button>
          <div id="importError" class="toast"></div>
        </section>

        <section class="panel">
          <h2>生成 Access Code</h2>
          <label>绑定邮箱
            <select id="grantAccount"></select>
          </label>
          <label>备注
            <input id="grantName" placeholder="订单号 / 用户名 / 备注" />
          </label>
          <div class="inline">
            <label>有效天数
              <input id="grantDays" type="number" min="0" value="7" />
            </label>
            <label>最大取件次数
              <input id="grantMaxReads" type="number" min="0" value="0" />
            </label>
          </div>
          <button id="createGrantBtn" type="button" style="margin-top:12px;">生成凭证</button>
          <div id="createdSecret" class="secret hidden"></div>
          <div id="grantError" class="toast"></div>
        </section>
      </div>

      <div>
        <section class="panel">
          <div class="toolbar">
            <label>邮箱筛选
              <select id="messageAccount"></select>
            </label>
            <label>读取数量
              <input id="fetchTop" type="number" min="1" max="30" value="10" />
            </label>
            <button id="fetchSelectedBtn" type="button">刷新所选</button>
            <button id="fetchAllBtn" type="button" class="secondary">刷新全部</button>
          </div>
          <div id="messageError" class="toast"></div>
          <h2>邮件记录</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>时间</th><th>邮箱</th><th>发件人</th><th>收件人</th><th>标题</th><th>验证码</th></tr>
              </thead>
              <tbody id="messagesBody"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <h2>邮箱账号</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>邮箱</th><th>类型</th><th>别名/收件过滤</th><th>状态</th><th>最后检查</th><th>操作</th></tr>
              </thead>
              <tbody id="accountsBody"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <h2>Access Code</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>备注</th><th>绑定邮箱</th><th>次数</th><th>状态</th><th>最后使用</th><th>操作</th></tr>
              </thead>
              <tbody id="grantsBody"></tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </section>
</main>

<dialog id="accountDialog">
  <div class="dialog-body">
    <h2>编辑邮箱</h2>
    <input id="editAccountId" type="hidden" />
    <label>标签
      <input id="editAccountLabel" />
    </label>
    <label>别名/目标收件地址
      <input id="editAccountTarget" placeholder="alias@example.com" />
    </label>
    <label>文件夹
      <input id="editAccountMailboxes" placeholder="INBOX,Junk" />
    </label>
    <label>发件人过滤
      <input id="editAccountSenders" />
    </label>
    <label>标题过滤
      <input id="editAccountSubjects" />
    </label>
    <label>关键词过滤
      <input id="editAccountKeywords" />
    </label>
  </div>
  <div class="dialog-actions">
    <button id="closeAccountDialog" type="button" class="secondary">取消</button>
    <button id="saveAccountBtn" type="button">保存</button>
  </div>
</dialog>

<dialog id="grantDialog">
  <div class="dialog-body">
    <h2>编辑 Access Code</h2>
    <input id="editGrantId" type="hidden" />
    <label>备注
      <input id="editGrantName" />
    </label>
    <label>绑定邮箱
      <select id="editGrantAccount"></select>
    </label>
    <div class="inline">
      <label>过期时间
        <input id="editGrantExpires" type="datetime-local" />
      </label>
      <label>最大取件次数
        <input id="editGrantMaxReads" type="number" min="0" />
      </label>
    </div>
    <label>已取次数
      <input id="editGrantReadCount" type="number" min="0" />
    </label>
  </div>
  <div class="dialog-actions">
    <button id="closeGrantDialog" type="button" class="secondary">取消</button>
    <button id="saveGrantBtn" type="button">保存</button>
  </div>
</dialog>

<script>
const $ = (id) => document.getElementById(id);
const splitList = (value) => String(value || '').split(',').map((item) => item.trim()).filter(Boolean);
let adminToken = localStorage.getItem('mailCodeAdminToken') || '';
let state = { accounts: [], grants: [], messages: [] };

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[char]));
}

function fmtTime(msOrIso) {
  if (!msOrIso) return '-';
  const date = typeof msOrIso === 'number' ? new Date(msOrIso) : new Date(msOrIso);
  if (Number.isNaN(date.getTime())) return String(msOrIso);
  return date.toLocaleString('zh-CN', { hour12: false });
}

function toDateInput(ms) {
  if (!ms) return '';
  const date = new Date(ms);
  if (Number.isNaN(date.getTime())) return '';
  date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
  return date.toISOString().slice(0, 16);
}

function fromDateInput(value) {
  return value ? new Date(value).getTime() : 0;
}

function setError(id, message) {
  $(id).textContent = message || '';
}

function showDialogError(message) {
  alert(message);
}

function setBusy(button, busy) {
  button.disabled = busy;
}

async function api(path, body, method = 'POST') {
  const response = await fetch(path, {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(adminToken ? { Authorization: `Bearer ${adminToken}` } : {}),
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  const text = await response.text();
  let data = {};
  try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
  if (!response.ok || data.ok === false) throw new Error(data.error || text || `HTTP ${response.status}`);
  return data;
}

async function refresh() {
  const data = await api('/api/admin/overview', null, 'GET');
  state = {
    accounts: data.accounts || [],
    grants: data.grants || [],
    messages: data.messages || [],
  };
  render();
}

function accountLabel(account) {
  const target = account.targetEmail && account.targetEmail !== account.email ? ` -> ${account.targetEmail}` : '';
  return `${account.email}${target}`;
}

function renderSelects() {
  const accountOptions = state.accounts.map((account) =>
    `<option value="${escapeHtml(account.id)}">${escapeHtml(accountLabel(account))} (${escapeHtml(account.provider)})</option>`
  ).join('');
  $('grantAccount').innerHTML = accountOptions;
  $('editGrantAccount').innerHTML = accountOptions;
  $('messageAccount').innerHTML = `<option value="">全部邮箱</option>${accountOptions}`;
}

function render() {
  $('dashboard').classList.remove('hidden');
  $('loginPanel').classList.add('hidden');
  $('statAccounts').textContent = state.accounts.length;
  $('statGrants').textContent = state.grants.length;
  $('statEnabled').textContent = state.accounts.filter((item) => item.enabled).length;
  $('statMessages').textContent = state.messages.length;
  renderSelects();
  renderMessages();
  renderAccounts();
  renderGrants();
}

function renderMessages() {
  if (!state.messages.length) {
    $('messagesBody').innerHTML = '<tr><td colspan="6"><div class="empty">暂无邮件记录</div></td></tr>';
    return;
  }
  $('messagesBody').innerHTML = state.messages.map((message) => {
    const account = message.account || {};
    const accountName = account.targetEmail || account.email || message.accountId;
    return `
      <tr>
        <td>${escapeHtml(fmtTime(message.receivedTimestamp || message.receivedDateTime || message.fetchedAt))}</td>
        <td><div class="mono">${escapeHtml(accountName)}</div><div class="muted">${escapeHtml(message.mailbox || '')}</div></td>
        <td class="mono">${escapeHtml(message.sender || '-')}</td>
        <td class="mono">${escapeHtml((message.recipients || []).join(', ') || '-')}</td>
        <td><strong>${escapeHtml(message.subject || '(无标题)')}</strong><div class="muted">${escapeHtml(message.bodyPreview || '')}</div></td>
        <td>${message.code ? `<span class="pill ok">${escapeHtml(message.code)}</span>` : '-'}</td>
      </tr>
    `;
  }).join('');
}

function renderAccounts() {
  if (!state.accounts.length) {
    $('accountsBody').innerHTML = '<tr><td colspan="6"><div class="empty">暂无邮箱账号</div></td></tr>';
    return;
  }
  $('accountsBody').innerHTML = state.accounts.map((account) => `
    <tr>
      <td>
        <div class="mono">${escapeHtml(account.email)}</div>
        <div class="muted">${escapeHtml(account.label || '')}</div>
        ${account.lastError ? `<div class="toast">${escapeHtml(account.lastError)}</div>` : ''}
      </td>
      <td>${escapeHtml(account.provider)}</td>
      <td>
        <div class="mono">${escapeHtml(account.targetEmail || account.email)}</div>
        <div class="muted">${escapeHtml((account.mailboxes || []).join(', '))}</div>
      </td>
      <td><span class="pill ${account.enabled ? 'ok' : 'off'}">${account.enabled ? escapeHtml(account.status || 'ready') : 'disabled'}</span></td>
      <td>${escapeHtml(fmtTime(account.lastCheckedAt))}</td>
      <td>
        <div class="actions">
          <button class="secondary" data-account-edit="${escapeHtml(account.id)}">编辑</button>
          <button class="secondary" data-account-fetch="${escapeHtml(account.id)}">刷新</button>
          <button class="ghost" data-account-toggle="${escapeHtml(account.id)}">${account.enabled ? '禁用' : '启用'}</button>
          <button class="danger" data-account-delete="${escapeHtml(account.id)}">删除</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function renderGrants() {
  if (!state.grants.length) {
    $('grantsBody').innerHTML = '<tr><td colspan="6"><div class="empty">暂无 Access Code</div></td></tr>';
    return;
  }
  $('grantsBody').innerHTML = state.grants.map((grant) => {
    const limit = grant.maxReads ? `${grant.readCount}/${grant.maxReads}` : `${grant.readCount}/不限`;
    const expired = grant.expiresAt && grant.expiresAt < Date.now();
    const statusClass = !grant.enabled ? 'off' : expired ? 'warn' : 'ok';
    const statusText = !grant.enabled ? 'disabled' : expired ? 'expired' : 'enabled';
    return `
      <tr>
        <td>${escapeHtml(grant.name || '-')}<div class="muted mono">${escapeHtml(grant.id)}</div></td>
        <td><span class="mono">${escapeHtml(grant.account?.targetEmail || grant.account?.email || grant.accountId)}</span></td>
        <td>${escapeHtml(limit)}<div class="muted">过期：${escapeHtml(grant.expiresAt ? fmtTime(grant.expiresAt) : '永不过期')}</div></td>
        <td><span class="pill ${statusClass}">${statusText}</span></td>
        <td>${escapeHtml(fmtTime(grant.lastUsedAt))}</td>
        <td>
          <div class="actions">
            <button class="secondary" data-grant-edit="${escapeHtml(grant.id)}">编辑</button>
            <button class="secondary" data-grant-regen="${escapeHtml(grant.id)}">重生成</button>
            <button class="ghost" data-grant-reset="${escapeHtml(grant.id)}">清次数</button>
            <button class="ghost" data-grant-toggle="${escapeHtml(grant.id)}">${grant.enabled ? '禁用' : '启用'}</button>
            <button class="danger" data-grant-delete="${escapeHtml(grant.id)}">删除</button>
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

function openAccountDialog(account) {
  $('editAccountId').value = account.id;
  $('editAccountLabel').value = account.label || '';
  $('editAccountTarget').value = account.targetEmail || '';
  $('editAccountMailboxes').value = (account.mailboxes || []).join(', ');
  $('editAccountSenders').value = (account.senderFilters || []).join(', ');
  $('editAccountSubjects').value = (account.subjectFilters || []).join(', ');
  $('editAccountKeywords').value = (account.requiredKeywords || []).join(', ');
  $('accountDialog').showModal();
}

function openGrantDialog(grant) {
  $('editGrantId').value = grant.id;
  $('editGrantName').value = grant.name || '';
  $('editGrantAccount').value = grant.accountId;
  $('editGrantExpires').value = toDateInput(grant.expiresAt);
  $('editGrantMaxReads').value = grant.maxReads || 0;
  $('editGrantReadCount').value = grant.readCount || 0;
  $('grantDialog').showModal();
}

async function fetchMessages(accountId = '') {
  setError('messageError', '');
  const data = await api('/api/admin/messages/fetch', {
    accountId,
    top: Number($('fetchTop').value || 10),
  });
  state.accounts = data.accounts || state.accounts;
  state.messages = data.messages || state.messages;
  render();
  if (data.errors?.length) {
    setError('messageError', data.errors.map((item) => `${item.email}: ${item.error}`).join('\n'));
  }
}

$('adminLoginBtn').addEventListener('click', async () => {
  setError('loginError', '');
  setBusy($('adminLoginBtn'), true);
  try {
    const data = await api('/api/admin/login', { password: $('adminPassword').value });
    adminToken = data.token;
    localStorage.setItem('mailCodeAdminToken', adminToken);
    await refresh();
  } catch (error) {
    setError('loginError', error.message);
  } finally {
    setBusy($('adminLoginBtn'), false);
  }
});

$('importBtn').addEventListener('click', async () => {
  setError('importError', '');
  setBusy($('importBtn'), true);
  try {
    const data = await api('/api/admin/accounts/import', {
      provider: $('importProvider').value,
      mailboxes: splitList($('importMailboxes').value),
      senderFilters: splitList($('importSenderFilters').value),
      text: $('importText').value,
    });
    state.accounts = data.accounts || [];
    $('importText').value = '';
    render();
  } catch (error) {
    setError('importError', error.message);
  } finally {
    setBusy($('importBtn'), false);
  }
});

$('createGrantBtn').addEventListener('click', async () => {
  setError('grantError', '');
  $('createdSecret').classList.add('hidden');
  setBusy($('createGrantBtn'), true);
  try {
    const data = await api('/api/admin/grants/create', {
      accountId: $('grantAccount').value,
      name: $('grantName').value,
      expiresInDays: Number($('grantDays').value || 0),
      maxReads: Number($('grantMaxReads').value || 0),
    });
    state.grants = data.grants || [];
    $('createdSecret').textContent = `请立即交给用户：${data.accessCode}`;
    $('createdSecret').classList.remove('hidden');
    render();
  } catch (error) {
    setError('grantError', error.message);
  } finally {
    setBusy($('createGrantBtn'), false);
  }
});

$('fetchSelectedBtn').addEventListener('click', async () => {
  setBusy($('fetchSelectedBtn'), true);
  try { await fetchMessages($('messageAccount').value); } catch (error) { setError('messageError', error.message); }
  finally { setBusy($('fetchSelectedBtn'), false); }
});

$('fetchAllBtn').addEventListener('click', async () => {
  setBusy($('fetchAllBtn'), true);
  try { await fetchMessages(''); } catch (error) { setError('messageError', error.message); }
  finally { setBusy($('fetchAllBtn'), false); }
});

$('saveAccountBtn').addEventListener('click', async () => {
  setBusy($('saveAccountBtn'), true);
  try {
    const data = await api('/api/admin/accounts/patch', {
      accountId: $('editAccountId').value,
      updates: {
        label: $('editAccountLabel').value,
        targetEmail: $('editAccountTarget').value,
        mailboxes: splitList($('editAccountMailboxes').value),
        senderFilters: splitList($('editAccountSenders').value),
        subjectFilters: splitList($('editAccountSubjects').value),
        requiredKeywords: splitList($('editAccountKeywords').value),
      },
    });
    state.accounts = data.accounts || state.accounts;
    state.messages = data.messages || state.messages;
    $('accountDialog').close();
    render();
  } catch (error) {
    showDialogError(error.message);
  } finally {
    setBusy($('saveAccountBtn'), false);
  }
});

$('saveGrantBtn').addEventListener('click', async () => {
  setBusy($('saveGrantBtn'), true);
  try {
    const data = await api('/api/admin/grants/patch', {
      grantId: $('editGrantId').value,
      updates: {
        name: $('editGrantName').value,
        accountId: $('editGrantAccount').value,
        expiresAt: fromDateInput($('editGrantExpires').value),
        maxReads: Number($('editGrantMaxReads').value || 0),
        readCount: Number($('editGrantReadCount').value || 0),
      },
    });
    state.grants = data.grants || state.grants;
    $('grantDialog').close();
    render();
  } catch (error) {
    showDialogError(error.message);
  } finally {
    setBusy($('saveGrantBtn'), false);
  }
});

$('closeAccountDialog').addEventListener('click', () => $('accountDialog').close());
$('closeGrantDialog').addEventListener('click', () => $('grantDialog').close());

document.addEventListener('click', async (event) => {
  const target = event.target;
  const accountEdit = target.dataset.accountEdit;
  const accountFetch = target.dataset.accountFetch;
  const accountToggle = target.dataset.accountToggle;
  const accountDelete = target.dataset.accountDelete;
  const grantEdit = target.dataset.grantEdit;
  const grantToggle = target.dataset.grantToggle;
  const grantReset = target.dataset.grantReset;
  const grantRegen = target.dataset.grantRegen;
  const grantDelete = target.dataset.grantDelete;
  try {
    if (accountEdit) {
      openAccountDialog(state.accounts.find((item) => item.id === accountEdit));
    }
    if (accountFetch) {
      await fetchMessages(accountFetch);
    }
    if (accountToggle) {
      const account = state.accounts.find((item) => item.id === accountToggle);
      const data = await api('/api/admin/accounts/patch', { accountId: accountToggle, updates: { enabled: !account.enabled } });
      state.accounts = data.accounts || state.accounts;
      state.messages = data.messages || state.messages;
      render();
    }
    if (accountDelete && confirm('确认删除这个邮箱账号及其全部 Access Code？')) {
      const data = await api('/api/admin/accounts/delete', { accountId: accountDelete });
      state.accounts = data.accounts || [];
      state.grants = data.grants || [];
      state.messages = data.messages || [];
      render();
    }
    if (grantEdit) {
      openGrantDialog(state.grants.find((item) => item.id === grantEdit));
    }
    if (grantToggle) {
      const grant = state.grants.find((item) => item.id === grantToggle);
      const data = await api('/api/admin/grants/patch', { grantId: grantToggle, updates: { enabled: !grant.enabled } });
      state.grants = data.grants || state.grants;
      render();
    }
    if (grantReset) {
      const data = await api('/api/admin/grants/patch', { grantId: grantReset, updates: { readCount: 0 } });
      state.grants = data.grants || state.grants;
      render();
    }
    if (grantRegen && confirm('重新生成后旧 Access Code 会立即失效，确认继续？')) {
      const data = await api('/api/admin/grants/regenerate', { grantId: grantRegen });
      state.grants = data.grants || state.grants;
      $('createdSecret').textContent = `新的 Access Code：${data.accessCode}`;
      $('createdSecret').classList.remove('hidden');
      render();
    }
    if (grantDelete && confirm('确认删除这个 Access Code？')) {
      const data = await api('/api/admin/grants/delete', { grantId: grantDelete });
      state.grants = data.grants || [];
      render();
    }
  } catch (error) {
    alert(error.message);
  }
});

if (adminToken) {
  refresh().catch(() => {
    adminToken = '';
    localStorage.removeItem('mailCodeAdminToken');
  });
}
</script>
</body>
</html>
